<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cápsula do Tempo - João Elias & Gabriely</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: sans-serif; background-color: #f8fafc; color: #1e293b; min-height: 100vh; }
    .container { max-width: 960px; margin: auto; padding: 0 1rem 2rem 1rem; }
    .text-center { text-align: center; }
    .mb-12 { margin-bottom: 3rem; }
    .text-5xl { font-size: 3rem; line-height: 1; }
    .font-bold { font-weight: 700; }
    .text-slate-700 { color: #475569; }
    .mb-2 { margin-bottom: 0.5rem; }
    .text-3xl { font-size: 1.875rem; line-height: 2.25rem; }
    .font-semibold { font-weight: 600; }
    .text-rose-600 { color: #e11d48; }
    .text-xl { font-size: 1.25rem; line-height: 1.75rem; }
    .mb-4 { margin-bottom: 1rem; }
    .text-lg { font-size: 1.125rem; line-height: 1.75rem; }
    .italic { font-style: italic; }
    .max-w-2xl { max-width: 42rem; margin: auto; }
    .max-w-3xl { max-width: 48rem; margin: auto; }
    .rounded-2xl { border-radius: 1rem; }
    .shadow-2xl { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
    .p-8 { padding: 2rem; }
    .w-full { width: 100%; }
    .border { border-width: 1px; }
    .border-gray-300 { border-color: #d1d5db; }
    .px-4 { padding-left: 1rem; padding-right: 1rem; }
    .py-2 { padding-top: 0.5rem; padding-bottom: 0.5rem; }
    .rounded-lg { border-radius: 0.5rem; }
    .bg-white { background-color: #fff; }
    .text-gray-800 { color: #1f2937; }
    .bg-gradient-to-r { background-image: linear-gradient(to right, #1e3a8a, #f43f5e); }
    .hover\:from-blue-800:hover { --tw-gradient-from: #1e40af; }
    .hover\:to-rose-600:hover { --tw-gradient-to: #e11d48; }
    .text-white { color: #fff; }
    .px-6 { padding-left: 1.5rem; padding-right: 1.5rem; }
    .py-3 { padding-top: 0.75rem; padding-bottom: 0.75rem; }
    .font-medium { font-weight: 500; }
    .transition-all { transition: all 150ms cubic-bezier(0.4, 0, 0.2, 1); }
    .spinner-icon { animation: spin 1s linear infinite; display: inline-block; margin-right: 8px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .success-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background-color: #4CAF50; color: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      z-index: 1000; text-align: center; opacity: 1; transition: opacity 0.5s; }
    .success-popup.hidden { opacity: 0; pointer-events: none; }

    #gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }
    #gallery img {
      cursor: pointer;
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover;
      border-radius: 0.5rem;
      transition: transform 0.2s ease;
    }
    #gallery img:hover { transform: scale(1.05); }

    #lightboxOverlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.9);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      flex-direction: column;
      padding: 1rem;
    }
    #lightboxImage {
      max-width: 90%;
      max-height: 80%;
      object-fit: contain;
      border-radius: 1rem;
      transition: transform 0.3s ease;
    }
    #lightboxCaption {
      color: #fff;
      text-align: center;
      font-size: 1.1rem;
      margin-top: 0.5rem;
    }
    .navButton {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      color: white;
      font-size: 2rem;
      background: rgba(0,0,0,0.3);
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      cursor: pointer;
      user-select: none;
    }
    #prevBtn { left: 1rem; }
    #nextBtn { right: 1rem; }
  </style>
</head>
<body class="bg-white text-gray-800">
  <div class="container mx-auto px-4 py-8">
    <div class="text-center mb-12">
      <h1 class="text-5xl font-bold text-slate-700 mb-2">Cápsula do Tempo</h1>
      <h2 class="text-3xl font-semibold text-rose-600 mb-2">João Elias & Gabriely</h2>
      <p class="text-xl text-gray-600 mb-4">05 de Outubro de 2025</p>
      <p class="text-lg text-gray-600 italic max-w-2xl mx-auto">
        Seu clique não é apenas uma foto, é um pedaço da nossa história, capturado no tempo.
      </p>
    </div>

    <div class="bg-white rounded-2xl shadow-2xl p-8 mb-12 max-w-3xl mx-auto text-center">
      <input type="file" id="fileInput" accept="image/*" class="mb-4 border border-gray-300 px-4 py-2 rounded-lg w-full text-gray-800" />
      <input type="text" id="guestName" placeholder="Seu nome (opcional)" class="mb-4 border border-gray-300 px-4 py-2 rounded-lg w-full text-gray-800" />
      <input type="text" id="guestMessage" placeholder="Mensagem para os noivos (opcional)" class="mb-4 border border-gray-300 px-4 py-2 rounded-lg w-full text-gray-800" />
      <button id="uploadButton" onclick="uploadPhoto()" class="bg-gradient-to-r from-blue-900 to-rose-500 hover:from-blue-800 hover:to-rose-600 text-white px-6 py-3 rounded-lg font-medium transition-all">
        💕 Enviar Foto
      </button>
    </div>

    <div class="bg-white rounded-2xl shadow-2xl p-8">
      <h3 class="text-3xl font-semibold text-gray-800 mb-8 text-center">✨ Galeria de Momentos Especiais</h3>
      <div id="gallery"></div>
    </div>
  </div>

  <div id="successPopup" class="success-popup hidden">
    Obrigado por compartilhar! Sua foto já está em nossa galeria. ❤️
  </div>

  <div id="lightboxOverlay">
    <span class="navButton" id="prevBtn">&#10094;</span>
    <img id="lightboxImage" />
    <span class="navButton" id="nextBtn">&#10095;</span>
    <div id="lightboxCaption"></div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

  <script>
    const IMGBB_API_KEY = "7eedffef4ccaae89b85c9f9c56c8071f";
    const firebaseConfig = {
      apiKey: "AIzaSyBWnPok4p37GnTI1JnSpLuaTqPEf92Ime0",
      authDomain: "capsula-do-tempo-3612d.firebaseapp.com",
      databaseURL: "https://capsula-do-tempo-3612d-default-rtdb.firebaseio.com",
      projectId: "capsula-do-tempo-3612d",
      storageBucket: "capsula-do-tempo-3612d.firebasestorage.app",
      messagingSenderId: "342686664227",
      appId: "1:342686664227:web:c4487263710ea5b5935396",
      measurementId: "G-PDV599LDP1"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const gallery = document.getElementById("gallery");
    const button = document.getElementById("uploadButton");

    let photos = [];
    let currentIndex = 0;

    function showPopup() {
      const popup = document.getElementById("successPopup");
      popup.classList.remove("hidden");
      setTimeout(() => popup.classList.add("hidden"), 3000);
    }

    // Função para reduzir imagem antes do upload
    function resizeImage(file, maxWidth = 1024, maxHeight = 1024, quality = 0.8) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          let { width, height } = img;
          if (width > maxWidth) {
            height *= maxWidth / width;
            width = maxWidth;
          }
          if (height > maxHeight) {
            width *= maxHeight / height;
            height = maxHeight;
          }
          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          canvas.toBlob(blob => resolve(blob), 'image/jpeg', quality);
        };
        img.src = URL.createObjectURL(file);
      });
    }

    async function uploadPhoto() {
      const file = document.getElementById('fileInput').files[0];
      const name = document.getElementById('guestName').value || 'Convidado';
      const message = document.getElementById('guestMessage').value || '';
      const original = button.innerHTML;
      if (!file) return alert("Escolha uma foto para enviar.");
      button.disabled = true;
      button.innerHTML = `<span class="spinner-icon">💕</span> Enviando...`;

      try {
        const resizedBlob = await resizeImage(file);
        const formData = new FormData();
        formData.append("image", resizedBlob, file.name);
        formData.append("name", name);
        formData.append("description", message);
        formData.append("expiration", "0");

        const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
          method: "POST",
          body: formData
        });

        const data = await res.json();
        if (data.data && data.data.url) {
          const photoURL = data.data.url;
          const newEntry = database.ref('photos').push();
          await newEntry.set({ name, message, url: photoURL, timestamp: Date.now() });
          showPopup();
        } else {
          alert("Erro no upload: " + (data.error?.message || "Verifique a conexão"));
        }
      } catch (err) {
        console.error(err);
        alert("Erro de conexão ou upload.");
      } finally {
        button.disabled = false;
        button.innerHTML = original;
        document.getElementById('fileInput').value = "";
        document.getElementById('guestName').value = "";
        document.getElementById('guestMessage').value = "";
      }
    }

    function addPhotoToGallery({ name, message, url }) {
      const img = document.createElement("img");
      img.src = url;
      img.dataset.name = name;
      img.dataset.message = message;
      gallery.appendChild(img);

      photos.push({ name, message, url });

      img.addEventListener("click", () => {
        currentIndex = photos.findIndex(p => p.url === url);
        showLightbox(currentIndex);
      });
    }

    function setupRealtimeGallery() {
      const photosRef = database.ref('photos');
      photosRef.orderByChild('timestamp').on('child_added', snapshot => {
        addPhotoToGallery(snapshot.val());
      });
    }

    window.onload = () => {
      setupRealtimeGallery();
    };

    const lightbox = document.getElementById("lightboxOverlay");
    const lightboxImage = document.getElementById("lightboxImage");
    const lightboxCaption = document.getElementById("lightboxCaption");

    function showLightbox(index) {
      const photo = photos[index];
      if (!photo) return;
      lightboxImage.src = photo.url;
      lightboxCaption.innerText = `${photo.name}: ${photo.message}`;
      lightbox.style.display = "flex";
      document.body.style.overflow = "hidden"; // Congela fundo
    }

    document.getElementById("prevBtn").addEventListener("click", (e) => {
      e.stopPropagation();
      currentIndex = (currentIndex - 1 + photos.length) % photos.length;
      showLightbox(currentIndex);
    });

    document.getElementById("nextBtn").addEventListener("click", (e) => {
      e.stopPropagation();
      currentIndex = (currentIndex + 1) % photos.length;
      showLightbox(currentIndex);
    });

    lightbox.addEventListener("click", () => {
      lightbox.style.display = "none";
      document.body.style.overflow = ""; // Libera fundo
    });

    // Swipe touch para lightbox
    let startX = 0;
    lightboxImage.addEventListener('touchstart', (e) => {
      startX = e.touches[0].clientX;
    });

    lightboxImage.addEventListener('touchend', (e) => {
      const endX = e.changedTouches[0].clientX;
      const diff = endX - startX;
      if (Math.abs(diff) > 50) {
        currentIndex = diff < 0 ? (currentIndex + 1) % photos.length : (currentIndex - 1 + photos.length) % photos.length;
        showLightbox(currentIndex);
      }
    });
  </script>
</body>
</html>
